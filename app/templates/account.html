{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-center border-bottom pb-3 mb-4">
                        <img class="rounded-circle shadow-sm me-3" 
                             src="{{ url_for('static', filename='profile_pics/' + current_user.image_file) }}" 
                             style="width: 125px; height: 125px; object-fit: cover;">
                        <div>
                            <h2 class="mb-0">{{ current_user.username }}</h2>
                            <p class="text-secondary mb-0">{{ current_user.email }}</p>
                        </div>
                    </div>

                    <form method="POST" action="" enctype="multipart/form-data">
                        <legend class="border-bottom mb-4 pb-2">Account Info</legend>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" value="{{ current_user.username }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
                        </div>
                        <hr>
                        <legend class="border-bottom mb-4 pb-2 text-info">Change Password (Optional)</legend>

                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="new_password" class="form-control" placeholder="Leave blank to keep current password">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Type new password again">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Update Profile Picture</label>
                            <input type="file" name="picture" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary mb-5">Update</button>
                    </form>

                    <div class="border-top pt-4">
                        <h4 class="text-danger">Danger Zone</h4>
                        <form action="{{ url_for('auth.delete_account') }}" method="POST">
                            <button type="submit" class="btn btn-outline-danger btn-sm" 
                                    onclick="return confirm('Are you sure you want to delete your account?')">
                                Delete Account Permanently
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

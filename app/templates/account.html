{% extends "layout.html" %}
{% block content %}
<div class="row bg-white p-4 shadow-sm rounded">
    <div class="col-md-4 text-center border-end">
        <img src="{{ image_file }}" class="rounded-circle img-thumbnail mb-3" style="width: 150px; height: 150px; object-fit: cover;">
        <h4>{{ current_user.username }}</h4>
        <p class="text-muted small">{{ current_user.email }}</p>
    </div>
    <div class="col-md-8 px-4">
        <h3>Profile Info</h3>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" value="{{ current_user.username }}">
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
            </div>
            <div class="mb-3">
                <label>Update Picture</label>
                <input type="file" name="picture" class="form-control">
            </div>
            <button type="submit" class="btn btn-dark mt-3">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 bg-white p-4 shadow-sm rounded">
        <h3 class="mb-4">{{ 'Update Post' if post else 'New Post' }}</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Post Title</label>
                <input type="text" name="title" class="form-control" value="{{ post.title if post else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Content</label>
                <textarea name="content" class="form-control" rows="8" required>{{ post.content if post else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-success px-5">Save Post</button>
            <a href="{{ url_for('main.home') }}" class="btn btn-light ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
